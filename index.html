<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DU四方人员</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E7E9F0;
  --panel:#FFFFFF;
  --panel-2:#F7F8FC;
  --ink:#131826;
  --ink2:#525C72;
  --ink3:#8992A6;
  --line:#DCE0EB;
  --rail:#131A2B;
  --rail-2:#0D1220;
  --green:#12775A;
  --red:#B5364A;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Noto Sans TC',system-ui,-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;
  --disp:'Archivo','Noto Sans TC',system-ui,sans-serif;
  /* 由 JS 依当前分类注入 */
  --ac:#3B6FE0;
  --ac-soft:#EAF0FD;
  --ac-deep:#2C55B4;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);background:var(--bg);color:var(--ink);
  font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--ac);outline-offset:2px}

.shell{display:grid;grid-template-columns:224px 1fr;height:100vh;overflow:hidden}
.gate{
  position:fixed;inset:0;z-index:200;display:grid;place-items:center;padding:24px;
  background:linear-gradient(160deg,var(--rail) 0%,#080B14 100%);
}
.gate.off{display:none}
.gate-box{width:100%;max-width:290px;text-align:center}
.gate-mark{
  width:46px;height:46px;border-radius:12px;margin:0 auto 16px;display:grid;place-items:center;
  background:#7B4FD4;color:#fff;font-family:var(--disp);font-weight:800;font-size:19px;
  box-shadow:0 0 0 5px rgba(123,79,212,.2);
}
.gate-box h2{color:#fff;font-size:17px;font-weight:900;letter-spacing:.16em}
.gate-sub{color:#6E778C;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;margin:5px 0 20px}
.gate-box input{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);
  border-radius:9px;padding:11px 14px;color:#fff;font-size:14px;outline:none;text-align:center;
  letter-spacing:.12em;margin-bottom:9px;
}
.gate-box input:focus{border-color:#7B4FD4;background:rgba(255,255,255,.1)}
.gate-box .btn{width:100%;background:#7B4FD4;border-color:#7B4FD4;padding:10px}
.gate-box .btn:hover{background:#6A3EC4;border-color:#6A3EC4}
.gate-err{color:#E8798A;font-size:12px;height:16px;margin-top:11px}

/* ---------- 左栏 ---------- */
.rail{
  background:linear-gradient(180deg,var(--rail) 0%,var(--rail-2) 100%);
  color:#C3C9D9;display:flex;flex-direction:column;overflow-y:auto;position:relative;
}
.rail::after{content:"";position:absolute;inset:0 0 0 auto;width:1px;background:rgba(255,255,255,.07)}
.brand{padding:18px 16px 15px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.brand-mark{
  width:30px;height:30px;border-radius:8px;flex:none;
  background:var(--ac);display:grid;place-items:center;
  font-family:var(--disp);font-weight:800;font-size:13px;color:#fff;
  box-shadow:0 0 0 3px color-mix(in srgb, var(--ac) 22%, transparent);
  transition:background .25s,box-shadow .25s;
}
.brand h1{font-size:14px;font-weight:900;letter-spacing:.14em;color:#fff}
.brand p{font-family:var(--mono);font-size:9.5px;color:#616B84;letter-spacing:.14em;margin-top:1px}
.rail-label{
  font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;color:#57607A;
  padding:16px 16px 7px;
}
.cat-list{padding-bottom:8px;flex:1}
.cat{
  width:100%;display:flex;align-items:center;gap:9px;
  padding:9px 14px 9px 7px;position:relative;cursor:grab;touch-action:none;
  transition:background .14s,opacity .14s;
}
.cat:hover{background:rgba(255,255,255,.045)}
.cat.on{background:linear-gradient(90deg,color-mix(in srgb,var(--ac) 28%,transparent),transparent 92%)}
.cat.on::before{content:"";position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--ac);border-radius:0 3px 3px 0}
.cat:active{cursor:grabbing}
.grip{
  flex:none;width:12px;padding:2px 0;font-size:12px;line-height:1;letter-spacing:-2px;
  color:#464F66;opacity:0;transition:.14s;user-select:none;pointer-events:none;
}
.cat:hover .grip,.cat:focus-visible .grip{opacity:1}
.grip:active{cursor:grabbing}
.cat.dragging{opacity:.45}
.cat.over{box-shadow:inset 0 2px 0 #fff}
.cat.over-last{box-shadow:inset 0 -2px 0 #fff}
body.dragging-on,body.dragging-on *{cursor:grabbing !important;user-select:none}
.chip{
  width:29px;height:29px;flex:none;display:grid;place-items:center;
  border:1px solid rgba(255,255,255,.14);border-radius:8px;
  color:var(--chipc,#9AA2B6);transition:.16s;
  background:color-mix(in srgb, var(--chipc,#6C7488) 15%, transparent);
}
.chip svg{width:16px;height:16px;display:block}
.emo{font-size:15px;line-height:1;display:block}
.ct-ic .emo{font-size:16px}
.pk .emo{font-size:16px}
.pk.emoji{font-size:16px}
.cat:hover .chip{color:#fff;background:color-mix(in srgb, var(--chipc,#6C7488) 30%, transparent)}
.cat.on .chip{border-color:transparent;color:#fff;background:var(--chipc)}
.cat-name{font-size:12.5px;font-weight:500;color:#C3C9D9;letter-spacing:.01em}
.cat.on .cat-name{color:#fff;font-weight:700}
.cat-name.editing{
  background:rgba(255,255,255,.14);border-radius:4px;padding:1px 5px;
  outline:1px solid #fff;cursor:text;min-width:52px;color:#fff;
}
.cat-edit{margin-left:auto;font-size:11px;color:#525B72;opacity:0;padding:0 2px;flex:none;transition:.14s}
.cat:hover .cat-edit{opacity:1}
.cat-edit:hover{color:#fff}
.cat-count{
  font-family:var(--mono);font-size:9.5px;color:#6B7490;flex:none;min-width:14px;text-align:right;
  background:rgba(255,255,255,.06);border-radius:3px;padding:1px 4px;
}
.cat.on .cat-count{background:rgba(255,255,255,.18);color:#fff}
.cat-add{
  display:flex;align-items:center;gap:9px;width:calc(100% - 20px);margin:6px 10px 4px;
  padding:8px 8px 8px 6px;border:1px dashed rgba(255,255,255,.18);border-radius:8px;
  color:#6E7791;font-size:12px;transition:.14s;
}
.cat-add:hover{border-color:rgba(255,255,255,.4);color:#fff;background:rgba(255,255,255,.04)}
.cat-add i{
  width:29px;height:29px;flex:none;display:grid;place-items:center;font-style:normal;
  font-size:15px;border-radius:8px;border:1px dashed rgba(255,255,255,.22);margin-left:12px;
}
.picker{display:flex;flex-wrap:wrap;gap:6px}
.pk{
  width:34px;height:34px;border:1px solid var(--line);border-radius:8px;
  display:grid;place-items:center;color:var(--ink2);background:var(--panel-2);transition:.12s;
}
.pk svg{width:17px;height:17px}
.pk:hover{border-color:var(--ink3)}
.pk.on{border-color:var(--ac);background:var(--ac);color:#fff;box-shadow:0 0 0 3px var(--ac-soft)}
.pk.tone{border:1px solid rgba(0,0,0,.12)}
.pk.tone.on{box-shadow:0 0 0 3px rgba(0,0,0,.12);border-color:var(--ink)}
.pk.tone::after{content:"";width:9px;height:9px;border-radius:50%;background:#fff;opacity:0}
.pk.tone.on::after{opacity:1}
.btn-del{color:var(--red);border-color:#EEDADF}
.btn-del:hover{background:#FBEEF1;border-color:var(--red)}
.rail-foot{padding:12px 16px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:6px}
.rail-foot button{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:#7D869D;text-align:left;padding:2px 0}
.rail-foot button:hover{color:#fff}

/* ---------- 主区 ---------- */
.main{display:flex;flex-direction:column;overflow:hidden;position:relative}
.accent-bar{height:3px;background:var(--ac);flex:none;transition:background .25s}
.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:0 24px;flex:none}
.topbar-row{position:relative;display:none}
.cat-title{display:flex;align-items:center;gap:11px;line-height:1.2}
.ct-ic{
  width:32px;height:32px;border-radius:50%;display:grid;place-items:center;flex:none;
  background:color-mix(in srgb,var(--ac) 12%, #fff);color:var(--ac);
  box-shadow:0 0 0 4px color-mix(in srgb,var(--ac) 6%, transparent);
  transition:.25s;
}
.ct-ic svg{width:17px;height:17px;display:block}
.cat-title:hover .ct-ic{transform:rotate(-6deg)}
.cat-title span{font-size:19px;font-weight:900;letter-spacing:.05em;color:var(--ink)}
.topbar-tools{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;gap:7px;align-items:center}
.search{display:flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:6px 10px}
.search:focus-within{border-color:var(--ac)}
.search input{background:none;border:none;outline:none;width:160px;font-size:13px}
.search span{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.btn{border:1px solid var(--line);border-radius:7px;padding:6px 12px;font-size:12.5px;font-weight:500;background:var(--panel);transition:.14s}
.btn:hover{border-color:var(--ink3);background:var(--panel-2)}
.btn-solid{background:var(--ac);border-color:var(--ac);color:#fff}
.btn-solid:hover{background:var(--ac-deep);border-color:var(--ac-deep)}
.btn-sm{padding:5px 10px;font-size:11.5px}


/* 分页轨道 */
.tabrow{display:flex;align-items:center;gap:10px;padding:12px 0 0}
.tabrow-sp{flex:1}
#tools{flex:none;display:inline-flex;gap:6px;align-items:center}
.tabrail{display:flex;gap:0;overflow-x:auto;align-items:flex-end;flex:0 1 auto;padding-right:6px}
.tab{
  position:relative;padding:9px 19px 8px;border:none;border-radius:0;
  clip-path:polygon(8px 0, calc(100% - 8px) 0, 100% 100%, 0 100%);
  background:color-mix(in srgb,var(--ac) 8%, var(--panel-2));
  color:var(--ink2);font-size:12.5px;font-weight:600;white-space:nowrap;
  top:1px;margin-right:-5px;display:flex;align-items:center;gap:7px;transition:.14s;
  cursor:grab;touch-action:none;user-select:none;
}
.tab:active{cursor:grabbing}
.tab.dragging{opacity:.45;transform:scale(.96)}
.tab.over-l{box-shadow:inset 4px 0 0 var(--ac)}
.tab.over-r{box-shadow:inset -4px 0 0 var(--ac)}
.tab:hover{background:color-mix(in srgb,var(--ac) 17%, var(--panel-2));color:var(--ink)}
.tab.on{background:var(--panel);color:var(--ink);font-weight:800;z-index:3}
.tab.on::after{
  content:"";position:absolute;left:8px;right:8px;top:0;height:3px;
  background:var(--ac);border-radius:0 0 3px 3px;
}
.tab:hover .tab-add{
  padding:6px 12px;flex:none;font-size:12px;font-weight:600;color:var(--ac);
  border:1px dashed color-mix(in srgb,var(--ac) 45%,var(--line));border-radius:7px;
  background:var(--panel);transition:.12s;white-space:nowrap;
}
.tab-add:hover{background:var(--ac-soft);border-style:solid}

/* 内容 */
.board.board-embed{padding:0;background:none;overflow:hidden}
.main-embed .topbar{padding:0}
.main-embed .tabrow{padding-left:14px}
.board{
  flex:1;overflow-y:auto;padding:20px 24px 60px;
  background-image:radial-gradient(circle, rgba(19,24,38,.06) 1px, transparent 1px);
  background-size:22px 22px;
}
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:14px;
  overflow:hidden;position:relative;box-shadow:0 1px 2px rgba(19,24,38,.04);
}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac);transition:background .25s}
.card-head{display:flex;align-items:center;gap:10px;padding:12px 15px 12px 18px;cursor:pointer;user-select:none}
.card-head:hover{background:var(--panel-2)}
.rc h4{cursor:pointer;transition:.12s;border-radius:5px}
.rc h4:hover{background:color-mix(in srgb,var(--ac) 12%,transparent)}
.rc h4.copied{background:#d1f0dd;color:#0a6b43}
.caret{font-family:var(--mono);font-size:9px;color:var(--ink3);transition:transform .18s;display:inline-block;flex:none}
.card.collapsed .caret{transform:rotate(-90deg)}
.card-title{font-size:13.5px;font-weight:700;letter-spacing:.02em}
.card-meta{font-family:var(--mono);font-size:10.5px;color:var(--ink3);margin-left:auto;display:flex;gap:11px;align-items:center}
.card-body{padding:0 15px 15px 18px}
.card-body.plain{padding:15px 15px 15px 18px}
.card.collapsed .card-body{display:none}

/* 表格 */

/* VCOTC 表格模式 */
.vbal{display:flex;gap:12px;margin:2px 0 12px;flex-wrap:wrap}
.vbal2{margin:2px 0 12px}
.vlimit-bar{display:flex;align-items:center;gap:7px;margin:2px 0 12px;flex-wrap:wrap}
.vlimit-gap{flex:1}
.vlimit-lbl{font-size:12px;font-weight:700;color:var(--ink3)}
.vlimit-sel{border:1px solid var(--line);background:var(--panel);color:var(--ink2);border-radius:8px;
  padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer}
.vlimit-sel:hover{border-color:var(--ac)}
.vlimit-cnt{font-size:11.5px;color:var(--ink3);margin-left:4px}
.vbal3{display:flex;gap:14px;margin:2px 0 14px;flex-wrap:wrap}
.vb3{flex:1;min-width:230px;display:flex;flex-direction:column;gap:6px;border-radius:14px;padding:14px 20px;
  border:1px solid;box-shadow:0 3px 12px rgba(0,0,0,.05)}
.vb3-k{font-size:12px;font-weight:800;letter-spacing:.2px}
.vb3-v{font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.05}
.vb3-rmb{background:linear-gradient(135deg,#e7f6ec,#d0ecda);border-color:#9fd8b4}
.vb3-rmb .vb3-k{color:#0b7c4e}
.vb3-rmb .vb3-v{color:#0a6b43}
.vb3-usdt{background:linear-gradient(135deg,#fdf3e0,#fbe6c4);border-color:#f0c987}
.vb3-usdt .vb3-k{color:#a8710f}
.vb3-usdt .vb3-v{color:#8a5c08}
.vbal2-row{display:flex;align-items:center;gap:0;background:#cfe6cf;border:1px solid #a9d0a9;border-radius:9px;overflow:hidden;flex-wrap:wrap}
.vbal2-row .vb-tag{background:#bcdcbc;font-weight:900;color:#1c3d1c;padding:11px 18px;font-size:13px;white-space:nowrap}
.vbal2-row .vb-lbl,.vbal2-row .vb-lbl2{font-weight:800;color:#234523;padding:11px 16px;font-size:13px;white-space:nowrap}
.vbal2-row .vb-lbl2{border-left:1px solid #a9d0a9;background:#c4e0c4}
.vbal2-row .vb-num,.vbal2-row .vb-num2{font-weight:900;color:#123312;padding:11px 22px;font-size:15px;font-variant-numeric:tabular-nums;flex:1;text-align:center;min-width:120px}
.vbal2-row .vb-num2{flex:0;padding-right:24px}
.vbal2-row.carry{background:#e3f0e3;border-color:#c3ddc3;margin-bottom:6px}
.vbal2-row.carry .vb-tag{background:#d3e6d3}
.vbal2-row .vb-in,.vbal2-row .vb-in2{flex:1;min-width:120px;border:1px solid #a9d0a9;border-radius:6px;
  padding:8px 12px;margin:6px 14px;font-size:14px;font-weight:800;color:#123312;background:#fff;
  font-variant-numeric:tabular-nums;text-align:center}
.vbal2-row .vb-in2{flex:0;width:130px}
.vtag{display:inline-block;background:color-mix(in srgb,var(--ac) 14%,transparent);color:var(--ac);
  font-weight:700;font-size:11px;padding:2px 9px;border-radius:999px}
.vtbl .tr-edit select{width:100%;min-width:100px;border:1px solid var(--ac);border-radius:6px;padding:4px 7px;font-size:12px;background:var(--panel)}
.vbal-cell{display:flex;flex-direction:column;gap:3px;background:linear-gradient(135deg,color-mix(in srgb,var(--ac) 14%,var(--panel)),var(--panel));
  border:1px solid color-mix(in srgb,var(--ac) 30%,var(--line));border-radius:11px;padding:10px 18px;min-width:150px}
.vbal-k{font-size:11px;font-weight:700;color:var(--ink3)}
.vbal-v{font-size:20px;font-weight:900;color:var(--ac);font-variant-numeric:tabular-nums}
.vtbl-wrap{overflow:auto;border:1px solid var(--line);border-radius:11px;background:var(--panel)}
.vtbl{border-collapse:collapse;width:100%;font-size:12.5px}
.vtbl th{background:var(--panel-2);color:var(--ink3);font-weight:700;text-align:left;padding:9px 12px;
  position:sticky;top:0;white-space:nowrap;border-bottom:1px solid var(--line);z-index:1}
.vtbl td{padding:8px 12px;border-top:1px solid var(--line);color:var(--ink);white-space:nowrap;
  max-width:220px;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums}
.vtbl tbody tr{cursor:pointer;transition:.12s}
.vtbl tbody tr:not([style]){background:#f6fafe}
.vtbl tbody tr:hover{background:#eaf4ff}
.vtbl .col-vrmb,.vtbl .col-vusdt{text-align:right;font-weight:800}
.vtbl .col-vrmb{color:#0a6b43}
.vtbl .col-vusdt{color:#a8710f}
.vtbl .col-vch{color:#546881;font-family:var(--mono);font-size:11.5px}
.vtbl .col-vmer{color:#7a8699;font-family:var(--mono);font-size:11.5px}
.vtbl .col-vrate{color:#8a6d3b;text-align:center}
.vtbl .col-vdate{color:#334;font-weight:600;white-space:nowrap}
.vtbl thead th{background:linear-gradient(180deg,#eef3f8,#e4ebf2);border-bottom:2px solid #cdd8e4}
.vdate-fix{color:#556;font-weight:600}
.vtbl .tr-edit input{width:100%;min-width:80px;border:1px solid var(--ac);border-radius:6px;padding:4px 7px;
  font-size:12px;font-family:inherit;background:var(--panel)}
.vtbl .tr-act{width:34px;text-align:center;padding:4px}
.vtbl .mini{border:none;border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:12px;opacity:.55;transition:.1s}
.vtbl .mini:hover{opacity:1}
.vtbl .mini.del{background:var(--red-bg,#fbe9e9);color:var(--red,#cf3b3b)}
.vtbl .mini.ok{background:#e7f6ec;color:#1f9d57}

.btn-danger{color:#cf3b3b;border-color:#f0c0c0}
.btn-danger:hover{background:#fbe9e9;border-color:#cf3b3b}

.rc-link{display:flex;flex-direction:column;align-items:stretch;padding:13px 15px;min-height:96px;gap:9px}
.rc-link h4{flex:none;text-align:left;font-size:14px;font-weight:800;line-height:1.35;
  word-break:break-word;color:var(--ink);text-shadow:none;margin:0;padding:0}
.rc-link:hover h4{color:var(--ac)}
.rc-link .rc-g{position:absolute;top:8px;right:26px}
.rc-link .rc-x{position:absolute;top:8px;right:8px}
.lk-row{display:flex;flex-wrap:wrap;gap:7px 10px;align-items:center;margin-top:auto}
.lk-url{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:#2563eb;
  text-decoration:none;background:#eef4ff;padding:4px 11px;border-radius:7px;transition:.12s;border:none;cursor:pointer}
.lk-url:hover{background:#2563eb;color:#fff}
.lk-url2{display:inline-flex;align-items:center;font-size:11.5px;font-weight:700;color:#64748b;
  text-decoration:none;background:var(--panel-2);padding:4px 9px;border-radius:7px;transition:.12s}
.lk-url2:hover{background:#e2e8f0;color:#334}
.linkview{display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.55);
  align-items:center;justify-content:center;padding:24px}
.lv-box{background:#fff;border-radius:14px;width:min(96vw,1200px);height:min(92vh,860px);
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.4)}
.lv-bar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:#15233b;color:#fff}
.lv-title{font-size:14px;font-weight:800}
.lv-sp{flex:1}
.lv-btn{font-size:12.5px;font-weight:700;color:#fff;background:rgba(255,255,255,.15);
  border:none;border-radius:7px;padding:6px 13px;cursor:pointer;text-decoration:none;transition:.12s}
.lv-btn:hover{background:rgba(255,255,255,.28)}
.lv-frame{flex:1;width:100%;border:none;background:#fff}
.lv-hint{font-size:11.5px;color:#94a3b8;text-align:center;padding:7px;background:#f8fafc}

.rs-row{display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:auto}

.rc-inp{width:66px;border:1px solid var(--ac);border-radius:5px;padding:2px 6px;font-size:12px;
  text-align:center;font-weight:800;color:#8a5c08;background:#fffdf7;outline:none}
.rd-strip{display:flex;align-items:stretch;background:#fff;border:1px solid #dbe3ed;border-radius:12px;overflow:hidden}
.rsx{flex:1;display:flex;flex-direction:column;gap:2px;padding:11px 18px;position:relative;min-width:120px}
.rsx+.rsx::before{content:"";position:absolute;left:0;top:22%;bottom:22%;width:1px;background:#e5eaf1}

.rsx-ed{font-style:normal;cursor:pointer;color:#c3ccd8;padding:0 3px;transition:.12s}

.rsx-inp{width:130px;border:1px solid var(--ac);border-radius:6px;padding:3px 8px;font-size:17px;
  font-weight:900;color:#2c3e56;background:#fff;outline:none;font-variant-numeric:tabular-nums}
.rsx b{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.15;color:#2c3e56}
.rsx-f b{color:#b5793a;font-size:17px}
.rsx-d{background:linear-gradient(90deg,transparent,#effaf3)}

/* 多选备注 */
.mlt{display:flex;flex-wrap:wrap;gap:5px}

  padding:3px 11px;font-size:11.5px;font-weight:700;cursor:pointer;transition:.12s;white-space:nowrap}

.fee-fix{font-weight:800;color:#a8761c;font-variant-numeric:tabular-nums}

.zt{transition:.12s}
.zt.on{background:var(--ac);border-color:var(--ac);color:#fff}
.cpn{cursor:pointer;border-radius:4px;transition:.12s;padding:0 3px;margin:0 -3px}
.cpn:hover{background:color-mix(in srgb,var(--ac) 15%,transparent);outline:1px solid color-mix(in srgb,var(--ac) 35%,transparent)}
.cpn.copied{background:#d1f0dd !important;color:#0a6b43 !important}
.rd-fees{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:0}
.fq{display:inline-flex;align-items:baseline;gap:6px;background:#fff;border:1px solid #dde4ed;
  border-radius:7px;padding:4px 11px;font-size:12px;font-weight:700;color:#177a45;font-variant-numeric:tabular-nums}
.fq b{font-size:11px;font-weight:900;color:#8a5c08}
.fq-sum{background:#0d5c31;border-color:#0d5c31;color:#fff;font-weight:900}
.vtbl .col-calc{text-align:right;font-weight:700;color:#8a5c08;font-variant-numeric:tabular-nums}
.vtbl .col-calc.dif{color:#0d5c31;font-weight:800}
.vtbl .col-dfee{text-align:center;color:#a8761c;font-weight:700}
.vtbl .col-dnote{min-width:150px;white-space:normal}
.vtbl .col-dnote .vtag{font-size:10.5px;padding:1px 7px;margin:1px}
.rd-box{background:#fdf9ec;border:1px solid #e8d9a8;border-radius:13px;padding:13px 16px;margin:2px 0 13px}
.rd-hd{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.rd-hd .sp{flex:1}
.rt-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.rt-tbl th{background:#f5ead0;color:#7c5e14;font-weight:800;padding:7px 10px;text-align:center;border:1px solid #e0cfa0;white-space:nowrap}
.rt-tbl td{padding:5px 8px;border:1px solid #ede0bd;text-align:center;background:#fffdf7}
.rt-in{width:100%;min-width:78px;border:1px solid #ddd0aa;border-radius:6px;padding:5px 8px;font-size:12.5px;text-align:center;background:#fff;font-variant-numeric:tabular-nums;font-weight:700;color:#5c4610}
.rt-in:focus{border-color:#c79a3a;outline:none;box-shadow:0 0 0 2px rgba(199,154,58,.2)}
.rt-in.fee{color:#8a5c08}
.rt-calc{font-weight:800;color:#6b5310;font-variant-numeric:tabular-nums}
.rt-calc.dif{color:#b5364a}
.rt-act{width:34px}
.rt-none{color:#a8956a;font-size:12px;padding:14px !important}
.rt-ft{text-align:right !important;font-weight:900;color:#14532d;background:#dff0e3 !important;font-size:13.5px}
.rt-total{font-weight:900;color:#14532d;background:#dff0e3 !important;font-size:17px;font-variant-numeric:tabular-nums}
.rd-title{font-size:16px;font-weight:900;color:#7c5e14}
.rd-cnt{font-size:12px;color:#9a7c30;font-weight:700}
.rd-sum{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#eef7f0,#ddeee2);
  border:1px solid #b8dcc5;border-radius:13px;padding:13px 20px;margin:2px 0 13px;flex-wrap:wrap}
.rd-title{font-size:16px;font-weight:900;color:#14532d}
.rd-total{display:flex;align-items:baseline;gap:9px;margin-left:auto}
.rd-k{font-size:12px;font-weight:800;color:#166534}
.rd-v{font-size:25px;font-weight:900;color:#14532d;font-variant-numeric:tabular-nums}
.rd-cnt{font-size:12px;color:#4b7c5c;font-weight:700}
.rd-empty{border:1px dashed var(--line);border-radius:11px;padding:40px 20px;text-align:center;
  color:var(--ink3);font-size:13px;background:var(--panel)}
.tab-sub{font-style:normal;opacity:.95}
.vtbl .col-damt{text-align:right;font-weight:800;color:#0a6b43}
.vtbl .col-dord{font-family:var(--mono);font-size:11.5px;color:#546881}
.vtbl .col-ddate{white-space:nowrap;color:#334;font-weight:600}

/* 汇入云端 */
.cloud-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(94vw,680px);
  max-height:88vh;overflow:auto;padding:18px 20px;box-shadow:0 18px 50px rgba(0,0,0,.3)}
.cloud-hd{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:6px}
.cloud-steps{font-size:11.5px;color:var(--ink3);background:var(--panel-2);border-radius:8px;padding:8px 11px;margin-bottom:8px;line-height:1.6}
.cloud-cols{font-size:12px;color:var(--ac);background:color-mix(in srgb,var(--ac) 10%,transparent);border-radius:8px;padding:7px 11px;margin-bottom:10px;font-weight:700}
.cloud-file{position:relative;display:flex;align-items:center;justify-content:center;gap:12px;width:100%;border:2px dashed var(--line);
  border-radius:10px;padding:18px;cursor:pointer;transition:.15s;background:var(--panel-2)}
.cloud-file:hover{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 6%,transparent)}
.cloud-file span{font-size:13px;font-weight:600;color:var(--ink3)}
.cloud-url{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:12.5px;background:var(--panel);color:var(--ink);font-family:var(--mono)}
.cloud-url:focus{border-color:var(--ac);outline:none}
.cloud-opt{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink2);margin:9px 0;cursor:pointer}
.cloud-msg{font-size:12px;margin:6px 0;min-height:16px}
.cloud-msg.ok{color:#0a8043}.cloud-msg.err{color:#cf3b3b}
.cloud-cnt{font-size:12px;color:var(--ink2);font-weight:700;margin-bottom:5px}
.cloud-tbl{overflow:auto;border:1px solid var(--line);border-radius:8px;max-height:210px}
.cloud-tbl table{border-collapse:collapse;width:100%;font-size:11.5px}
.cloud-tbl th{background:var(--panel-2);padding:6px 9px;text-align:left;color:var(--ink3);position:sticky;top:0;white-space:nowrap}
.cloud-tbl td{padding:5px 9px;border-top:1px solid var(--line);color:var(--ink);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.cloud-bar{display:flex;align-items:center;gap:8px;margin-top:14px}
.cloud-bar .sp{flex:1}

/* 一次两笔 */
.multi-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(94vw,720px);
  max-height:88vh;overflow:auto;padding:18px 20px;box-shadow:0 18px 50px rgba(0,0,0,.3)}
.multi-hd{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:14px}
.multi-cols{display:flex;gap:16px;flex-wrap:wrap}
.mcol{flex:1;min-width:250px;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:14px}
.mcol-h{font-size:13px;font-weight:800;color:var(--ac);margin-bottom:10px}
.mcol-date{font-size:11px;font-weight:600;color:var(--ink3)}
.mf{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.mf>span{font-size:11.5px;font-weight:700;color:var(--ink3)}
.mf input,.mf select{border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-size:13px;
  background:var(--panel);color:var(--ink)}
.mf input:focus,.mf select:focus{border-color:var(--ac);outline:none}
.multi-bar{display:flex;align-items:center;gap:8px;margin-top:14px}
.multi-bar .sp{flex:1}

/* 批次贴上 */
.paste-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(92vw,680px);
  max-height:86vh;overflow:auto;padding:18px 20px;box-shadow:0 18px 50px rgba(0,0,0,.3)}
.paste-hd{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:4px}
.paste-sub{font-size:11.5px;font-weight:600;color:var(--ink3)}
.paste-cols{font-size:12px;color:var(--ac);background:color-mix(in srgb,var(--ac) 10%,transparent);
  border-radius:8px;padding:7px 11px;margin:10px 0 8px;font-weight:700}
.paste-ta{width:100%;height:150px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;
  font-family:var(--mono);font-size:12px;resize:vertical;background:var(--panel-2);color:var(--ink)}
.paste-opt{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink2);margin:9px 0;cursor:pointer}
.paste-prev{margin-top:6px}
.paste-cnt{font-size:12px;color:var(--ink2);font-weight:700;margin-bottom:5px}
.paste-tbl{overflow:auto;border:1px solid var(--line);border-radius:8px;max-height:210px}
.paste-tbl table{border-collapse:collapse;width:100%;font-size:11.5px}
.paste-tbl th{background:var(--panel-2);padding:6px 9px;text-align:left;color:var(--ink3);position:sticky;top:0;white-space:nowrap}
.paste-tbl td{padding:5px 9px;border-top:1px solid var(--line);color:var(--ink);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.paste-bar{display:flex;align-items:center;gap:8px;margin-top:14px}
.paste-bar .sp{flex:1}

/* 嵌入页 */
.embed-wrap{display:flex;flex-direction:column;height:calc(100vh - 172px);min-height:420px;
  border:1px solid var(--line);border-radius:11px;overflow:hidden;background:#fff}
.embed-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);background:var(--panel-2)}
.embed-url{font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:min(52vw,560px)}
.embed-bar .sp{flex:1}
.embed-bar a.btn{text-decoration:none;display:inline-flex;align-items:center}
.embed-hint{padding:9px 12px;font-size:11.5px;color:var(--ink3);background:#FFFBEB;border-bottom:1px solid #F5E6B8}
.embed-frame{flex:1;width:100%;border:none;background:#fff}
.embed-wrap.bare{border:none;border-radius:0;height:100%;min-height:calc(100vh - 96px);background:#fff}
.embed-wrap.bare .embed-hint{position:absolute;left:50%;top:40px;transform:translateX(-50%);z-index:2;
  background:#FFFBEB;border:1px solid #F5E6B8;border-radius:8px;padding:7px 13px;font-size:11.5px;
  box-shadow:0 4px 14px rgba(0,0,0,.06);white-space:nowrap}
.embed-wrap.bare .embed-hint a{color:var(--ac);font-weight:700;margin-left:5px}

/* 抓试算表的分页用的表格 */
.tbl-wrap{border:1px solid var(--line);border-radius:7px;overflow:auto;max-height:58vh}
.tbl-wrap table{border-collapse:collapse;width:100%;font-family:var(--mono);font-size:12px}
.tbl-wrap thead th{position:sticky;top:0;background:var(--rail);color:#AEB6C8;text-align:left;
  padding:8px 11px;font-weight:500;white-space:nowrap;letter-spacing:.06em;font-size:10.5px}
.tbl-wrap tbody td{padding:7px 11px;border-bottom:1px solid #EEF0F6;white-space:nowrap;vertical-align:top}
.tbl-wrap tbody tr:nth-child(even){background:#FBFBFE}
.tbl-wrap tbody tr:hover{background:var(--ac-soft)}
.tbl-wrap tbody tr:last-child td{border-bottom:none}
.tbl-wrap .rownum{color:var(--ink3);font-size:10px;width:36px}
.tbl-wrap td a{color:var(--ac)}

/* 卡片式资料 */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(224px,1fr));gap:8px;align-items:start}
.rc{
  --rowc:#C9CFDC;
  position:relative;overflow:hidden;
  background:linear-gradient(100deg, color-mix(in srgb,var(--rowc) 10%, var(--panel)) 0%, var(--panel) 62%);
  border:1px solid color-mix(in srgb,var(--rowc) 28%, var(--line));
  border-radius:10px;padding:9px 10px 9px 8px;box-shadow:0 1px 2px rgba(19,24,38,.04);
  transition:.14s;cursor:grab;touch-action:none;user-select:none;display:flex;align-items:center;gap:4px;min-height:54px;
}
.rc::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rowc)}
.rc:hover{border-color:var(--rowc);box-shadow:0 3px 12px color-mix(in srgb,var(--rowc) 26%, transparent)}
.rc:hover h4{color:color-mix(in srgb,var(--rowc) 62%, var(--ink))}
.rc.editing{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-soft);background:#fff}
.rc-h{display:flex;align-items:flex-start;gap:7px;flex-wrap:wrap}
/* 点开的视窗 */
.rowdlg{max-width:760px;padding:0;display:flex;flex-direction:column;max-height:86vh;border-top-width:3px}
.rm-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:18px 22px 14px;border-bottom:1px solid var(--line)}
.rm-h h3{font-size:17px;font-weight:900;line-height:1.35}
.rm-h h3.as-date{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--ink2)}
.rm-b{padding:16px 22px;overflow-y:auto;flex:1}
.rm-b .rc-d{margin-top:0}
.rm-b .rc-b:first-child{margin-top:0;padding-top:0;border-top:none}
.rm-empty{color:var(--ink3);font-size:13px;padding:26px 0;text-align:center}
.rowdlg .dialog-foot{margin:0;padding:13px 22px;border-top:1px solid var(--line);background:var(--panel-2);
  border-radius:0 0 12px 12px;align-items:center}
.rowdlg .dialog-foot .sp{flex:1}
.rc h4{
  font-size:15px;font-weight:900;line-height:1.3;flex:1;min-width:0;word-break:break-word;text-align:center;
  letter-spacing:.01em;color:color-mix(in srgb,var(--rowc) 26%, var(--ink));
  text-shadow:0 1px 0 rgba(255,255,255,.9), 0 -1px 0 color-mix(in srgb,var(--rowc) 14%, transparent);
  padding:2px 0;
}
.rc h4.as-date{font-family:var(--mono);font-size:13.5px;font-weight:600;letter-spacing:.04em}
.rc-sp{flex:1}
.rc-g{font-family:var(--mono);font-size:10px;letter-spacing:-2px;color:#CDD3DF;flex:none;
  padding:2px 1px;opacity:0;transition:.12s;line-height:1;pointer-events:none}
.rc:hover .rc-g{opacity:1}
.rc-x{font-family:var(--mono);font-size:11px;color:var(--ink3);opacity:0;padding:2px 3px;transition:.12s;flex:none}
.rc:hover .rc-x{opacity:1}
.rc:active{cursor:grabbing}
.rc.dragging{opacity:.4;transform:scale(.97)}
.rc.over-l{box-shadow:inset 3px 0 0 var(--ac)}
.rc.over-r{box-shadow:inset -3px 0 0 var(--ac)}
.rc-x:hover{color:var(--red)}
.rc-d{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px 20px;margin-top:11px}

<body>
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-mark">D</div>
    <h2>DU四方人员</h2>
    <p class="gate-sub">输入密码进入</p>
    <input type="password" id="gatePass" placeholder="密码" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')tryGate()">
    <button class="btn btn-solid" onclick="tryGate()">进入</button>
    <p class="gate-err" id="gateErr"></p>
  </div>
</div>
<div class="shell">
  <nav class="rail">
    <div class="brand">
      <div class="brand-mark" id="brandMark">D</div>
      <div>
        <h1>DU四方人员</h1>
        <p id="railStamp">— —</p>
      </div>
    </div>
    <div class="rail-label">分类</div>
    <div class="cat-list" id="catList"></div>
    <button class="cat-add" onclick="openCatDialog()"><i>＋</i><span>新增分类</span></button>
    <div class="rail-foot">
      <button onclick="toggleAll()">▤ 全部收起／展开</button>
    </div>
  </nav>

  <div class="main">
    <div class="accent-bar"></div>
    <header class="topbar">
      <input id="q" type="hidden" value="">
      <div class="tabrow">
        <div class="tabrail" id="tabRail"></div>
        <span class="tabrow-sp"></span>
        <span id="tools"></span>
      </div>
    </header>
    <div class="board" id="board"></div>
  </div>
</div>

<div class="mask" id="tabMask">
  <div class="dialog">
    <h3>新增分页</h3>
    <p id="dlgWhere">为此分类绑定 Google 试算表的工作表。每个分类各抓各的，彼此不会混到。</p>
    <div class="field"><label>试算表网址</label>
      <input id="fUrl" placeholder="https://docs.google.com/spreadsheets/d/...">
      <div class="hint">留空＝用这个分类已设定的试算表。试算表需设为「知道连结的人可检视」。</div>
    </div>
    <div class="field"><label>工作表名称（每行一个，可一次建多页）</label>
      <textarea id="fSheets" rows="3" placeholder="工作表1&#10;工作表2"></textarea>
      <div class="hint">要跟 Google 底下那排分页标签的字完全一样。留空＝抓网址 #gid= 指到的那一页。</div>
    </div>
    <div class="field"><label>显示名称（只填一个工作表时可用，留空＝同工作表名）</label>
      <input id="fName" placeholder="例：2 月商户名单">
    </div>
    <div class="dialog-foot">
      <button class="btn" onclick="closeDialog('tabMask')">取消</button>
      <button class="btn btn-solid" onclick="saveTab()">建立分页</button>
    </div>
  </div>
</div>
<div class="mask" id="catMask">
  <div class="dialog">
    <h3 id="catDlgTitle">新增分类</h3>
    <p>取个名字，挑一个图示跟代表色。切到这一类时整个介面会换成它的颜色。</p>
    <div class="field"><label>分类名称</label><input id="cName" placeholder="例：四方对帐异常"></div>
    <div class="field"><label>本类试算表网址（底下分页共用）</label>
      <input id="cUrl" placeholder="https://docs.google.com/spreadsheets/d/...">
      <div class="hint">设一次就好。底下每个分页会各自去抓与分页同名的工作表。</div>
    </div>
    <div class="field"><label>图示</label><div class="picker" id="iconPick"></div></div>
    <div class="field"><label>代表色</label><div class="picker" id="tonePick"></div></div>

      <button class="btn btn-del" id="catDel" onclick="delCat()">删除分类</button>
      <span style="flex:1"></span>

      <button class="btn btn-solid" onclick="saveCat()">储存</button>

</div>
<div class="mask" id="fldMask">
  <div class="dialog">
    <h3>新增栏位</h3>
    <p>只加在这个分页，这一页每一则都会多这个栏位。</p>
    <div class="field"><label>栏位名称</label><input id="fldName" placeholder="例：对接窗口"></div>
    <div class="field"><label>型别</label><div class="picker fldtypes" id="fldType"></div></div>
    <div id="fldHidden"></div>

</div>

  <div class="dialog rowdlg">

    <div class="rm-b" id="rowBody"></div>

</div>

    <h3 id="optTitle">编辑选项</h3>

    <div id="optList"></div>
    <button class="btn btn-sm" style="margin-top:4px" onclick="addOpt()">＋ 新增选项</button>
    <div class="dialog-foot">
      <button class="btn" onclick="closeDialog('optMask')">取消</button>
      <button class="btn btn-solid" onclick="saveOpts()">储存</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===== 密码 ===== */
/* 要改密码，改下面这行的引号内文字就好 */
const GATE_PASS = 'du4444';
const gateEl = () => document.getElementById('gate');
function openGate(){
  gateEl().classList.add('off');
  try{ sessionStorage.setItem('gate.ok', '1') }catch(_){}
}
function tryGate(){
  const el = document.getElementById('gatePass');
  if(el.value === GATE_PASS) return openGate();
  document.getElementById('gateErr').textContent = '密码不对';
  el.value = ''; el.focus();
}
try{ if(sessionStorage.getItem('gate.ok') === '1') gateEl().classList.add('off');
     else document.getElementById('gatePass').focus(); }catch(_){}

/* ===== 储存：本机优先，环境不允许时退回记忆体 ===== */
const mem = {};
const store = {
  get(k){ try{ return localStorage.getItem(k) ?? mem[k] ?? null }catch(e){ return mem[k] ?? null } },
  set(k,v){ mem[k]=v; try{ localStorage.setItem(k,v) }catch(e){} }
};

/* ===== 图示库 ===== */
const S = p => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${p}</svg>`;
const ICON_LIB = {
  bars:  S(`<line x1="4" y1="20" x2="20" y2="20"/><rect x="6" y="12" width="3.4" height="6"/>
            <rect x="10.8" y="7" width="3.4" height="11"/><rect x="15.6" y="14.5" width="3.4" height="3.5"/>`),
  swap:  S(`<path d="M4 9h13"/><path d="M14 6l3 3-3 3"/><path d="M20 15H7"/><path d="M10 12l-3 3 3 3"/>`),
  box:   S(`<path d="M3 8.2 12 4l9 4.2v7.6L12 20l-9-4.2z"/><path d="M3 8.2 12 12.4l9-4.2"/><path d="M12 12.4V20"/>`),
  key:   S(`<circle cx="8" cy="12" r="3.4"/><path d="M11.4 12H21"/><path d="M17.6 12v3.2"/><path d="M20.4 12v2.4"/>`),
  cloud: S(`<path d="M7.2 18.5A3.7 3.7 0 0 1 7 11.1a5 5 0 0 1 9.6-1.4A3.9 3.9 0 0 1 17 18.5z"/>`),
  coins: S(`<ellipse cx="12" cy="7" rx="7.4" ry="3"/><path d="M4.6 7v10c0 1.7 3.3 3 7.4 3s7.4-1.3 7.4-3V7"/>
            <path d="M4.6 12c0 1.7 3.3 3 7.4 3s7.4-1.3 7.4-3"/>`),
  doc:   S(`<path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 12h6"/><path d="M9 16h6"/>`),
  flag:  S(`<path d="M6 21V4"/><path d="M6 4h11l-2 3.5L17 11H6z"/>`),
  clock: S(`<circle cx="12" cy="12" r="8"/><path d="M12 7.5V12l3 2"/>`),
  shield:S(`<path d="M12 3.5 19 6v5.5c0 4-3 7.3-7 9-4-1.7-7-5-7-9V6z"/><path d="M9.2 12.2l2 2 3.6-4"/>`),
  users: S(`<circle cx="9.5" cy="9" r="3"/><path d="M4 19c.6-3.2 2.8-5 5.5-5s4.9 1.8 5.5 5"/>
            <path d="M16 6.6a3 3 0 0 1 0 5.8"/><path d="M17.5 14.4c1.6.7 2.7 2.3 3 4.6"/>`),
  tag:   S(`<path d="M4 11.4V5a1 1 0 0 1 1-1h6.4a1 1 0 0 1 .7.3l7.6 7.6a1 1 0 0 1 0 1.4l-6.4 6.4a1 1 0 0 1-1.4 0L4.3 12.1a1 1 0 0 1-.3-.7z"/>
            <circle cx="8.4" cy="8.4" r="1.3"/>`),
  bolt:  S(`<path d="M13.5 3 5 13.6h6L10.5 21 19 10.4h-6z"/>`),
  pin:   S(`<path d="M12 21s6.5-6 6.5-10.4A6.5 6.5 0 0 0 5.5 10.6C5.5 15 12 21 12 21z"/><circle cx="12" cy="10.4" r="2.4"/>`)
};

const SF = p => `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">${p}</svg>`;

/* ===== Google 试算表 ===== */
function parseUrl(url, gidIn){
  const id = (url.match(/\/d\/([a-zA-Z0-9-_]+)/) || [])[1];
  const gid = gidIn && gidIn.trim() ? gidIn.trim() : (url.match(/[#&?]gid=(\d+)/) || [])[1] || '0';
  return {id, gid};
}
/* 每个分页指向自己的工作表：优先用工作表名称，其次 gid */
function srcQuery(t){
  return t.sheet ? 'sheet=' + encodeURIComponent(t.sheet) : 'gid=' + (t.gid || '0');
}
function srcLabel(t){
  return t.sheet ? '工作表 ' + t.sheet : 'gid ' + (t.gid || '0');
}
/* 分页自己的试算表；没填就用所属分类的 */
function ownerCat(t){ return cats.find(c => c.tabs.some(x => x.id === t.id)) }
function tabSid(t){ return t.sid || ownerCat(t)?.sid || '' }
async function pull(t){
  const sid = tabSid(t);
  if(!sid){ cache[t.id] = {status:'nosrc'}; renderBoard(); return }
  cache[t.id] = {status:'load'};
  renderBoard();
  try{
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&${srcQuery(t)}`);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const txt = await res.text();
    const m = txt.match(/setResponse\(([\s\S]*)\)/);
    if(!m) throw new Error('读不到资料，请确认试算表已开放检视');
    const j = JSON.parse(m[1]);
    if(j.status === 'error'){
      const msg = j.errors?.[0]?.detailed_message || j.errors?.[0]?.message || '试算表回传错误';
      throw new Error(t.sheet ? `找不到工作表「${t.sheet}」，请确认名称与 Google 分页标签一致` : msg);
    }
    const cols = j.table.cols.map((c,i) => (c.label||'').trim() || String.fromCharCode(65+i));
    let rows = j.table.rows.map(r => r.c.map(c => c ? (c.f ?? c.v ?? '') : ''));
    if(cols.every((c,i) => c === String.fromCharCode(65+i)) && rows.length){
      const head = rows.shift();
      head.forEach((h,i) => { if(String(h).trim()) cols[i] = String(h).trim() });
    }
    rows = rows.filter(r => r.some(v => String(v).trim() !== ''));
    cache[t.id] = {status:'ok', cols, rows, at:new Date()};
  }catch(e){
    cache[t.id] = {status:'err', err:e.message};
  }
  renderBoard();
}

const optsOf = (t, f) => (t.opts && t.opts[f.key]) || f.opts || [];
const sumOf = t => SUM_OF[t.cols];
const colsOf = t => [...(COLS[t.cols] || COLS.base), ...(t.xcols || [])].filter(f => !(t.hidden || []).includes(f.key));
const findTab = tid => cats.flatMap(c => c.tabs).find(x => x.id === tid);
const clone = v => JSON.parse(JSON.stringify(v));

let editRow = null;    // 正在编辑的列
let beforeRows = null; // 进入编辑前的整页快照
const undoStack = {};  // 每个分页各自的上一步

function pushUndo(tid, rows){
  (undoStack[tid] ||= []).push(clone(rows));
  if(undoStack[tid].length > 30) undoStack[tid].shift();
}
function driveThumb(u){
  const m = String(u).match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?[^]*id=)([A-Za-z0-9-_]+)/);
  return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400` : u;
}

/* --- 一笔一张卡 --- */
function cardParts(t){
  const cols  = colsOf(t);
  const title = cols.find(f => f.type === 'text') || cols.find(f => f.type === 'date') || null;
  const pills = cols.filter(f => f.type === 'select');
  const metas = cols.filter(f => ['text','num','date'].includes(f.type) && f !== title);
  const blocks= cols.filter(f => ['rich','img'].includes(f.type));
  return {cols, title, pills, metas, blocks};
}
function cardRead(t, r){
  // 所需云端连结：专属卡片（名称+网址可点+帐号密码可复制）
  if(t.cols === 'link'){
    const nm = r.lname || '（未命名）';
    const url = (r.lurl||'').trim();
    const acc = (r.lacc||'').trim();
    const pw  = (r.lpw||'').trim();
    const urlPart = url
      ? `<button class="lk-url" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();openLink('${esc(url).replace(/'/g,"\\'")}','${esc(nm).replace(/'/g,"\\'")}')">🔗 在这里打开</button>
         <a class="lk-url2" href="${esc(url)}" target="_blank" rel="noopener" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation()" title="用新分页打开">↗ 新分页</a>`
      : `<span class="lk-nourl">（网址待填）</span>`;
    const accPart = acc
      ? `<span class="lk-kv">帐号 <b data-copy="${esc(acc)}" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();copyFromEl(this)" title="点一下复制">${esc(acc)}</b></span>` : '';
    const pwPart = pw
      ? `<span class="lk-kv">密码 <b data-copy="${esc(pw)}" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();copyFromEl(this)" title="点一下复制">${esc(pw)}</b></span>` : '';
    const palette = ['#5B8DEF','#22A699','#E0779C','#E08A3C','#8B5CC4','#0EA5A5','#C0698A','#4B9E6A','#D98246','#6B7FD8'];
    const ci = (t.rows||[]).indexOf(r);
    const rc = palette[((ci%palette.length)+palette.length)%palette.length];
    return `<article class="rc rc-link" data-id="${r.id}" style="--rowc:${rc}" onpointerdown="cardGrip(event,'${t.id}','${r.id}')">
      <span class="rc-g" aria-hidden="true">⋮⋮</span>
      <h4 data-copy="${esc(nm)}" title="点一下复制名称" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();copyFromEl(this)">${esc(nm)}</h4>
      <div class="lk-row">${urlPart}${accPart}${pwPart}</div>
      <button class="rc-x" title="删除这则" onclick="event.stopPropagation();gridDel('${t.id}','${r.id}')">✕</button>
    </article>`;
  }
  const {title, pills} = cardParts(t);
  const head = title ? (r[title.key] || '（未填）') : '—';
  const key = pills[0];                                   // 用第一个下拉栏当分色依据
  const o   = key ? optsOf(t, key).find(x => x.v === r[key.key]) : null;
  const tone = o ? ` style="--rowc:${o.c}"` : '';
  return `<article class="rc" data-id="${r.id}"${tone} onpointerdown="cardGrip(event,'${t.id}','${r.id}')"
           title="${key && r[key.key] ? esc(key.label + '：' + r[key.key]) : '点开看内容'}">
    <span class="rc-g" aria-hidden="true">⋮⋮</span>
    <h4 class="${title && title.type==='date'?'as-date':''}" title="点一下复制名称" data-copy="${esc(head)}" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();copyFromEl(this)">${esc(head)}</h4>
    <button class="rc-x" title="删除这则" onclick="event.stopPropagation();gridDel('${t.id}','${r.id}')">✕</button>
  </article>`;
}

function copyFromEl(el){
  const txt = el.getAttribute('data-copy') || el.textContent.trim();
  copyText(txt, {currentTarget: el});
}
function copyText(txt, ev){
  const done = () => {
    if(ev){ const el = ev.currentTarget; el.classList.add('copied'); setTimeout(()=>el.classList.remove('copied'), 900); }
    toast('已复制：' + txt);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  }else fallbackCopy(txt, done);
}
function fallbackCopy(txt, cb){
  const ta = document.createElement('textarea');
  ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); cb&&cb(); }catch(e){ toast('复制失败'); }
  document.body.removeChild(ta);
}

/* ===== 卡片拖曳排序 ===== */
let cdrag = null;
const clearCardMarks = () => document.querySelectorAll('.rc').forEach(x => x.classList.remove('over-l','over-r'));
function residGrip(ev, tid, rid){
  if(ev.target.closest && (ev.target.closest('.rc-x') || ev.target.closest('h4'))) return;
  ev.preventDefault();
  const el = ev.currentTarget, x0 = ev.clientX, y0 = ev.clientY;
  let moved = false;
  const move = e => { if(!moved && (Math.abs(e.clientX-x0)>5 || Math.abs(e.clientY-y0)>5)) moved = true; };
  const up = () => {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    if(!moved) openResidDetail(tid, rid);
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
}
// 开某商户的明细分页（没有就建）
function openResidDetail(tid, rid){
  const c = cats.find(x => x.tabs.some(t => t.id === tid));
  const t = c.tabs.find(t => t.id === tid);
  const r = (t.rows||[]).find(x => x.id === rid);
  if(!r) return;
  const nm = r.rname || '未命名';
  const detId = 'rsd_' + rid;
  let det = c.tabs.find(x => x.id === detId);
  if(!det){
    det = {id:detId, name:nm, kind:'grid', cols:'rdetail', rows:[], sub:true, backTo:tid};
    c.tabs.push(det);
    save();
  }
  curTab = detId;
  renderTabs(); renderBoard();
}
function toggleMulti(tid, rid, key, val){
  const t = findTab(tid);
  const r = (t.rows||[]).find(x => x.id === rid);
  if(!r) return;
  const cur = String(r[key]||'').split(',').map(x=>x.trim()).filter(Boolean);
  const i = cur.indexOf(val);
  if(i >= 0) cur.splice(i,1); else cur.push(val);
  r[key] = cur.join(',');
  save(); renderBoard();
  if(openRowId) renderRowModal();
}
function editApply(tid, el){
  const t = findTab(tid);
  const box = el.closest('.rsx');
  const b = box.querySelector('b');
  const inp = document.createElement('input');
  inp.type = 'number'; inp.step = '0.01';
  inp.value = t.applyOverride ?? '';
  inp.placeholder = '留空＝自动加总';
  inp.className = 'rsx-inp';
  inp.onblur = () => { t.applyOverride = inp.value === '' ? null : inp.value; save(); renderBoard(); };
  inp.onkeydown = e => { if(e.key === 'Enter') inp.blur(); if(e.key === 'Escape') renderBoard(); };
  b.replaceWith(inp);
  inp.focus(); inp.select();
}
function editCurFee(tid, el){
  const t = findTab(tid);
  const inp = document.createElement('input');
  inp.type = 'number'; inp.step = '0.01';
  inp.value = t.curFee ? String(Number(t.curFee) * 100) : '';
  inp.placeholder = '2.8';
  inp.className = 'rc-inp';
  inp.onblur = () => setCurFee(tid, feeParse(inp.value));
  inp.onkeydown = e => { if(e.key === 'Enter') inp.blur(); if(e.key === 'Escape') renderBoard(); };
  el.replaceWith(inp);
  inp.focus(); inp.select();
}
// 费率显示成百分比（0.028 → 2.8%）；输入时可打 2.8 或 0.028 都吃
function feePct(v){
  const n = Number(v);
  if(v === '' || v == null || isNaN(n)) return '';
  return (n * 100).toFixed(2).replace(/\.?0+$/, '') + '%';
}
function feeParse(v){
  const n = Number(String(v).replace('%','').trim());
  if(isNaN(n)) return '';
  const r = n > 1 ? n / 100 : n;        // 打 2.8 当 2.8%；打 0.028 当原值
  return String(Number(r.toFixed(6)));  // 去掉浮点误差
}
function toggleZero(tid){
  const t = findTab(tid);
  t.hideZero = !t.hideZero;
  save(); renderBoard();
}
function setCurFee(tid, val){
  const t = findTab(tid);
  t.curFee = val;      // 只当作「之后新增明细的预设费率」，不改任何既有明细
  save(); renderBoard();
}
function backToResid(tid){
  const c = cats.find(x => x.tabs.some(t => t.id === tid));
  const t = c.tabs.find(t => t.id === tid);
  curTab = t.backTo || c.tabs[0].id;
  renderTabs(); renderBoard();
}

function cardGrip(ev, tid, rid){
  if(ev.target.closest && ev.target.closest('.rc-x')) return;   // 删除钮自己处理
  ev.preventDefault();
  const el = ev.currentTarget, x0 = ev.clientX, y0 = ev.clientY;
  let moved = false;
  cdrag = {target:null, after:false};
  const move = e => {
    if(!moved && (Math.abs(e.clientX - x0) > 5 || Math.abs(e.clientY - y0) > 5)){
      moved = true;
      el.classList.add('dragging'); document.body.classList.add('dragging-on');
    }
    if(!moved) return;
    clearCardMarks(); cdrag.target = null;
    const over = document.elementFromPoint(e.clientX, e.clientY);
    const card = over && over.closest ? over.closest('.rc') : null;
    if(card && card.dataset.id !== rid){
      const b = card.getBoundingClientRect();
      const after = (e.clientX - b.left) > b.width / 2;
      card.classList.add(after ? 'over-r' : 'over-l');
      cdrag.target = card.dataset.id; cdrag.after = after;
    }
  };
  const up = () => {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    el.classList.remove('dragging'); document.body.classList.remove('dragging-on'); clearCardMarks();
    if(moved){ if(cdrag && cdrag.target) reorderRow(tid, rid, cdrag.target, cdrag.after) }
    else openRow(tid, rid);                    // 没拖就是点开
    cdrag = null;
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
  document.addEventListener('pointercancel', up);
}
function reorderRow(tid, rid, targetId, after){
  const t = findTab(tid);
  pushUndo(tid, t.rows);
  const from = t.rows.findIndex(r => r.id === rid);
  const [m] = t.rows.splice(from, 1);
  const to = t.rows.findIndex(r => r.id === targetId);
  t.rows.splice(after ? to + 1 : to, 0, m);
  save(); renderBoard();
}

/* ===== 点开的视窗 ===== */
let openRowId = null;
function openRow(tid, rid){
  openRowId = rid;
  renderRowModal();
  document.getElementById('rowMask').classList.add('on');
}
function closeRow(){
  commitEdit();
  openRowId = null;
  document.getElementById('rowMask').classList.remove('on');
  renderBoard();
}
function editRowInModal(){
  beforeRows = clone(tab().rows || []);
  editRow = openRowId;
  renderRowModal();
}
function doneRow(){ commitEdit(); renderRowModal(); renderBoard() }
function delRowInModal(){
  const t = tab(), rid = openRowId;
  pushUndo(t.id, t.rows);
  t.rows = t.rows.filter(r => r.id !== rid);
  editRow = null; beforeRows = null; openRowId = null;
  save();
  document.getElementById('rowMask').classList.remove('on');
  renderBoard(); toast('已删除，可按「上一步」救回');
}
function renderRowModal(){
  const t = tab();
  const r = (t.rows || []).find(x => x.id === openRowId);
  if(!r) return closeRow();
  const {title, pills, metas, blocks} = cardParts(t);
  const editing = editRow === r.id;
  const head = title ? (r[title.key] || '（未填）') : '';

  document.getElementById('rowTitle').innerHTML =
    `${title ? `<h3 class="${title.type==='date'?'as-date':''}">${esc(head)}</h3>` : '<h3>这一则</h3>'}
     ${editing ? '' : pills.map(f => readCell(t, f, r)).join('')}
     <span class="rc-sp"></span>
     ${editing && t.cols !== 'vcotc' ? `<button class="addfld" onclick="openFieldDialog('${t.id}')" title="帮这一页加一个新栏位">＋ 栏位</button>` : ''}`;

  const sm = metas.filter(f => r[f.key] !== '' && r[f.key] != null);
  const sb = blocks.filter(f => r[f.key] || r[f.key + '_h']);
  document.getElementById('rowBody').innerHTML = editing
    ? `<div class="rc-form">${colsOf(t).map(f => {
        const isVc = t.cols === 'vcotc';
        const xbtn = isVc ? '' : `<button class="rf-x" title="移除这个栏位" onclick="event.preventDefault();delField('${t.id}','${f.key}')">✕</button>`;
        // VCOTC 的日期栏：唯读显示今天，不给编辑
        if(t.cols === 'rdetail' && f.key === 'dfee'){
          const fv = r.dfee || t.curFee || '';
          if(!r.dfee && t.curFee) r.dfee = t.curFee;
          return `<label class="rf t-num"><span>${f.label}</span><div class="rf-datefix">${fv?feePct(fv):'—'}（跟当前费率）</div></label>`;
        }
        if(isVc && f.type === 'date'){
          const d = r[f.key] || new Date().toISOString().slice(0,10);
          if(!r[f.key]) r[f.key] = d;
          return `<label class="rf t-date"><span>${f.label}</span><div class="rf-datefix">${esc(d)}（自动带今天）</div></label>`;
        }
        return `<label class="rf t-${f.type}"><span>${f.label}${xbtn}</span>${editCell(t, f, r)}</label>`;
      }).join('')}</div>`
    : (sm.length || sb.length)
      ? `${sm.length ? `<dl class="rc-d">${sm.map(f =>
            `<div><dt>${f.label}</dt><dd>${readCell(t, f, r)}</dd></div>`).join('')}</dl>` : ''}
         ${sb.map(f => `<section class="rc-b"><h5>${f.label}</h5>${readCell(t, f, r)}</section>`).join('')}`
      : `<p class="rm-empty">这一则还没有内容，按「编辑」开始填。</p>`;

  document.getElementById('rowFoot').innerHTML = editing
    ? `<span class="sp"></span><button class="btn btn-solid" onclick="doneRow()">完成</button>`
    : `<span class="sp"></span>
       <button class="btn" onclick="closeRow()">关闭</button>
       <button class="btn btn-solid" onclick="editRowInModal()">✎ 编辑</button>`;

  if(editing){
    document.querySelectorAll('#rowBody textarea').forEach(autoGrow);
    focusCard();
  }
}
function cardEdit(t, r){
  return `<article class="rc editing" onfocusout="gridBlur(event)">
    <div class="rc-form">
      ${colsOf(t).map(f => `<label class="rf t-${f.type}"><span>${f.label}</span>${editCell(t, f, r)}</label>`).join('')}
    </div>
    <footer class="rc-f">
      <button class="rc-del" onclick="gridDel('${t.id}','${r.id}')">删除这则</button>
    </footer>
  </article>`;
}

/* --- 格子 --- */
function readCell(t, f, r){
  const v = r[f.key] || '';
  if(f.type === 'date')   return `<span class="v-date">${v ? esc(v) : '—'}</span>`;
  if(f.type === 'text')   return v ? `<div class="v-mono">${esc(v)}</div>` : '<span class="v-empty">—</span>';
  if(f.type === 'num'){
    if(v === '' || v == null) return '<span class="v-empty">—</span>';
    const shown = f.money ? Number(v).toLocaleString('zh-TW') : esc(v);
    return `<span class="v-num">${shown}${f.unit?`<i>${f.unit}</i>`:''}</span>`;
  }
  if(f.type === 'select'){
    if(!v) return '';
    const o = optsOf(t, f).find(x => x.v === v), c = o ? o.c : '#6C7488';

function editCell(t, f, r){

      onkeydown="gridKey(event,'${t.id}')" oninput="gridSet('${t.id}','${r.id}','${f.key}',this.value)">`;
  if(f.type === 'multi'){

         style="${v?`background-image:url('${esc(driveThumb(v))}')`:''}">${v?'':'图'}</a>
      <input type="url" placeholder="贴图片或云端硬碟网址" value="${esc(v)}"
        onkeydown="gridKey(event,'${t.id}')" oninput="gridSet('${t.id}','${r.id}','${f.key}',this.value)"
        onchange="gridThumb('${r.id}',this.value)">
    </div>`;
  if(f.type === 'rich'){
    const k = f.key;
    return `
      <div class="rt-bar">
        <button onmousedown="event.preventDefault()" onclick="rt('bold','${k}')" title="粗体"><b>B</b></button>
        <button onmousedown="event.preventDefault()" onclick="rt('under','${k}')" title="底线"><u>U</u></button>

          <span class="swatch" id="sw-color-${k}" style="background:${lastColor}"></span>字<b class="cv">▾</b></button>
        <button class="rt-tog" onmousedown="event.preventDefault()" onclick="rtPop('mark','${k}',event)" title="萤光底色">
          <span class="swatch sq" id="sw-mark-${k}" style="background:${lastMark}"></span>光<b class="cv">▾</b></button>
        <span class="rt-sep"></span>
        <button onmousedown="event.preventDefault()" onclick="rt('clear','${k}')" title="清掉格式">清除</button>

        <div class="rt-pop" id="pop-mark-${k}">${MARK_COLORS.map(([hex,nm]) =>
          `<button class="dot sq" style="background:${hex}" title="${nm}" onmousedown="event.preventDefault()" onclick="pickMark('${hex}','${k}')"></button>`).join('')}</div>
      </div>
      <div class="rt" id="e_${k}" contenteditable="true" data-ph="${f.label}"
        onkeydown="rtKey(event,'${t.id}')" oninput="rtSync('${k}')"
        onpaste="event.preventDefault();document.execCommand('insertText',false,(event.clipboardData||window.clipboardData).getData('text'))"
      >${r[k + '_h'] || esc(v)}</div>`;
  }
  return '';
}

const yearOf = r => String(r.date || '').slice(0,4) || '未填日期';

const curSeg = t => segSel[t.id] || '全部';
function setSeg(tid, v){ segSel[tid] = v; renderBoard() }

function gridView(t, q){
  const all  = t.rows || [];
  const cols = colsOf(t);
  const keys = cols.map(f => f.key);
  const fl   = filterOf(t), seg = curSeg(t);
  const vlimit = t.vlimit || 'all';
  const rows0 = all.filter(r => r.id === editRow ||
    ((!fl || seg === '全部' || (r[fl.key] || '') === seg) &&
     (!q || keys.some(k => String(r[k]||'').toLowerCase().includes(q)))));
  const rowsZ = (t.hideZero && (t.cols === 'vcotc'))
    ? rows0.filter(r => (Number(r.vrmb)||0) !== 0 || r.id === editRow) : rows0;
  const rows = (t.cols === 'vcotc' && vlimit !== 'all') ? rowsZ.slice(0, Number(vlimit)) : rowsZ;

  const hasDate = cols.some(f => f.type === 'date');
  const undoN   = (undoStack[t.id] || []).length;

  const sf    = sumOf(t);
  const total = sf ? all.reduce((n, r) => n + (Number(r[sf.key]) || 0), 0) : null;
  const totalBox = sf ? `<div class="total">总金额<b>${total.toLocaleString('zh-TW')}</b></div>` : '';
  const bar = `<div class="grid-bar">${totalBox}${segsHTML(t)}<span class="sp"></span>

  const emptyMsg = () => `<div class="yempty">${q ? '这个关键字没有符合的则。'

  const table = arr => `<div class="cards">${arr.map(r => r.id === editRow ? cardEdit(t,r) : cardRead(t,r)).join('')}</div>`;

  // ── 残留明细页 ──
  if(t.cols === 'rdetail'){
    const fmtD = n => Number(n||0).toLocaleString('zh-TW',{maximumFractionDigits:2});
    const sumAmt = all.reduce((n,r) => n + (Number(r.damt)||0), 0);
    const hideZeroD = !!t.hideZero;
    const barD = `<div class="grid-bar">
        <button class="btn btn-sm" onclick="backToResid('${t.id}')">← 返回总览</button>
        <span class="rd-name2">${esc((t.name||"").replace(/^(内部|外部)\s*·\s*/, ""))}</span>
        <button class="btn btn-sm zt${hideZeroD?' on':''}" onclick="toggleZero('${t.id}')">${hideZeroD?'✓ 只看有金额':'只看有金额'}</button>
        <span class="sp"></span>
        <button class="btn btn-sm btn-solid" ${editRow?'disabled':''} onclick="gridAdd('${t.id}')">＋ 新增一则</button>
        <button class="btn btn-sm" ${undoN?'':'disabled'} onclick="gridUndo('${t.id}')">↶ 上一步</button>
      </div>`;
    // 每笔明细自带费率：手续费 = 申请金额 × 该笔费率；差额 = 申请金额 - 手续费
    const lineCalc = r => {
      const a = Number(r.damt)||0, f = Number(r.dfee)||0;
      const mf = a * f;
      return {a, f, mf, dif: a - mf};
    };
    const autoApply = all.reduce((n,r) => n + lineCalc(r).a, 0);
    const sumApply = (t.applyOverride != null && t.applyOverride !== '') ? Number(t.applyOverride) : autoApply;
    const sumFee   = all.reduce((n,r) => n + lineCalc(r).mf, 0);
    const sumRemain= all.reduce((n,r) => n + lineCalc(r).dif, 0);
    const curFee   = t.curFee ?? '';
    // 依费率分组统计（自动，不影响明细）
    const byFee = {};
    all.forEach(r => { const c = lineCalc(r); const k = r.dfee || '未设';
      (byFee[k] ||= {amt:0, fee:0, dif:0, n:0});
      byFee[k].amt += c.a; byFee[k].fee += c.mf; byFee[k].dif += c.dif; byFee[k].n++; });
    const hist = t.hist || [];
    const feeKeys = Object.keys(byFee).sort();
    const feeList = hist.length
      ? hist.map(h => ({f:h.f, d:Number(h.d)||0}))
      : (feeKeys.length > 1 ? feeKeys.map(k => ({f:k, d:byFee[k].dif})) : []);
    const feeTotal = feeList.reduce((n,x) => n + x.d, 0);
    const feeChips = feeList.length
      ? feeList.map(x => `<span class="fq cpn" data-copy="${x.d}" title="点一下复制" onclick="copyFromEl(this)"><b>${feePct(x.f)}</b> ${fmtD(x.d)}</span>`).join('')
      : '';
    const sumD = `<div class="rd-panel">
        <div class="rd-top">
          <div class="rd-strip">
            <div class="rsx"><span>申请总额 <i class="rsx-ed" title="点数字可改" onclick="editApply('${t.id}',this)">✎</i></span>
              <b class="cpn" data-copy="${sumApply}" title="点一下复制（笔的✎可改）" onclick="copyFromEl(this)">${fmtD(sumApply)}</b></div>
            <div class="rsx rsx-f"><span>商户手续费</span><b class="cpn" data-copy="${sumFee}" title="点一下复制" onclick="copyFromEl(this)">−${fmtD(sumFee)}</b></div>
            <div class="rsx rsx-d"><span>总残留</span><b class="cpn" data-copy="${sumRemain}" title="点一下复制" onclick="copyFromEl(this)">${fmtD(sumRemain)}</b></div>
          </div>
        </div>
        <div class="rd-row2">
          ${feeChips ? `<div class="rd-fees">${feeChips}</div>` : '<span></span>'}
          <span class="sp"></span>
          <span class="rd-cur2" title="点一下改；只影响之后新增的明细">
            <span class="rc-lb">费率</span>
            <b onclick="editCurFee('${t.id}',this)">${curFee ? feePct(curFee) : '—'}</b>
          </span>
        </div>
      </div>`;
    const headD = cols.map(f => `<th class="col-${f.key}">${esc(f.label)}</th>`).join('')
      + '<th class="col-calc">商户手续费</th><th class="col-calc">商户差额</th>';
    const rowsD = hideZeroD ? rows.filter(r => (Number(r.damt)||0) !== 0 || r.id === editRow) : rows;
    const bodyD = rowsD.map(r => r.id === editRow
      ? `<tr class="tr-edit">${cols.map(f => `<td>${tblEditCell(t,r,f)}</td>`).join('')}
          <td class="tr-act"><button class="mini ok" onclick="commitEdit();renderBoard()">✓</button></td></tr>`
      : (() => { const c = lineCalc(r);
        return `<tr onclick="openRow('${t.id}','${r.id}')">${cols.map(f => {
          const v = r[f.key] ?? '';
          let cell;
          if(f.type === 'multi' && v){
            cell = String(v).split(',').filter(Boolean).map(x => {
              const o = (f.opts||[]).find(y => y.v === x.trim()), c = o ? o.c : '#6C7488';
              return `<span class="vtag" style="background:${c}1F;color:${c};border:1px solid ${c}55">${esc(x.trim())}</span>`;
            }).join(' ');
          } else if(f.key === 'dfee'){
            cell = v===''?'—':`<span class="fee-pct">${feePct(v)}</span>`;
          } else if(f.type==='num' && f.money){
            cell = v===''?'':`<span class="cpn" data-copy="${v}" onclick="event.stopPropagation();copyFromEl(this)">${fmtD(v)}</span>`;
          } else if(v && (f.key==='dord' || f.key==='dmer')){
            cell = `<span class="cpn" data-copy="${esc(v)}" onclick="event.stopPropagation();copyFromEl(this)">${esc(v)}</span>`;
          } else cell = esc(v);
          return `<td class="col-${f.key}">${cell}</td>`;
        }).join('')}
          <td class="col-calc">${c.f?`<span class="cpn" data-copy="${c.mf}" onclick="event.stopPropagation();copyFromEl(this)">${fmtD(c.mf)}</span>`:'—'}</td>
          <td class="col-calc dif">${c.f?`<span class="cpn" data-copy="${c.dif}" onclick="event.stopPropagation();copyFromEl(this)">${fmtD(c.dif)}</span>`:'—'}</td>
          <td class="tr-act"><button class="mini del" onclick="event.stopPropagation();gridDel('${t.id}','${r.id}')">✕</button></td></tr>`; })()
    ).join('');
    const tblD = rowsD.length
      ? `<div class="vtbl-wrap"><table class="vtbl"><thead><tr>${headD}<th class="tr-act"></th></tr></thead><tbody>${bodyD}</tbody></table></div>`
      : `<div class="rd-empty">${hideZeroD ? '没有金额不为 0 的明细。' : '这个商户还没有明细。用「＋新增一则」「📋批次贴上」或「📥汇入 CSV」加入。'}</div>`;
    return barD + sumD + tblD;
  }

  // ── 四方残留暂存：筛选钮 + 通道卡片 ──
  if(t.cols === 'resid'){
    const fmt = n => Number(n||0).toLocaleString('zh-TW',{maximumFractionDigits:3});
    const hideZero = !!t.hideZero;
    const bar2 = `<div class="grid-bar">${segsHTML(t)}
        <button class="btn btn-sm zt${hideZero?' on':''}" onclick="toggleZero('${t.id}')">${hideZero?'✓ 只看有余额':'只看有余额'}</button>
        <span class="sp"></span>
        <button class="btn btn-sm btn-solid" ${editRow?'disabled':''} onclick="gridAdd('${t.id}')">＋ 新增一则</button>
        <button class="btn btn-sm" ${undoN?'':'disabled'} onclick="gridUndo('${t.id}')">↶ 上一步</button>
        <button class="btn btn-sm" onclick="openCloud('${t.id}')">📥 汇入 CSV</button>
        <button class="btn btn-sm btn-danger" onclick="clearPage('${t.id}')">🗑 清空本页</button>
      </div>`;
    const rowsF = hideZero ? rows.filter(r => (Number(r.ramt)||0) !== 0 || r.id === editRow) : rows;
    const cardsHTML = rowsF.map(r => {
      if(r.id === editRow) return cardEdit(t, r);
      const amt = Number(r.ramt)||0;
      const isIn = (r.rgrp||'') === '内部';
      const dim = amt <= 0 ? ' rs-zero' : '';
      return `<article class="rc rc-resid${dim} ${isIn?'rs-cin':'rs-cout'}${seg==='全部'?'':' no-tag'}" data-id="${r.id}" onpointerdown="residGrip(event,'${t.id}','${r.id}')">
        <span class="rc-g" aria-hidden="true">⋮⋮</span>
        ${seg === '全部' ? `<span class="rs-tag ${isIn?'in':'out'}">${isIn?'内':'外'}</span>` : ''}
        <h4 data-copy="${esc(r.rname||'')}" title="点一下复制" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();copyFromEl(this)">${esc(r.rname||'（未命名）')}</h4>
        <div class="rs-amt${amt>0?'':' zero'} cpn" data-copy="${amt}" title="点一下复制" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();copyFromEl(this)">${fmt(amt)}</div>

    return bar2 + (rowsF.length ? `<div class="cards">${cardsHTML}</div>`

  }

  // ── 表格模式（VCOTC 这种流水帐）──
  if(t.cols === 'vcotc'){
    const fmt = (n,d) => Number(n).toLocaleString('zh-TW',{maximumFractionDigits:d});
    const cell = (r,f) => {
      const v = r[f.key] ?? '';
      if(f.type === 'num' && f.money){

        return `<span class="cpn" data-copy="${v}" title="点一下复制" onclick="event.stopPropagation();copyFromEl(this)" style="color:${neg?'#cf3b3b':''}">${fmt(v,2)}</span>`;

        const o = (f.opts||[]).find(x => x.v === v);

      if(f.key === 'memo') return r.memo_h || esc(v);
      return esc(v);
    };
    const head = cols.map(f => `<th class="col-${f.key}">${esc(f.label)}</th>`).join('');
    const bodyRows = rows.map(r => r.id === editRow
      ? `<tr class="tr-edit">${cols.map(f => `<td class="col-${f.key}">${tblEditCell(t,r,f)}</td>`).join('')}
          <td class="tr-act"><button class="mini ok" onclick="commitEdit();renderBoard()">✓</button></td></tr>`
      : (() => {
          const vt = r.vtype || '';
          const o = vt ? (cols.find(f=>f.key==='vtype').opts||[]).find(x=>x.v===vt) : null;
          const rowStyle = o ? `style="background:${o.c}26;box-shadow:inset 4px 0 0 ${o.c}"` : '';
          return `<tr ${rowStyle} onclick="openRow('${t.id}','${r.id}')">${cols.map(f => `<td class="col-${f.key}">${cell(r,f)}</td>`).join('')}

    ).join('');

    // 自动算：最新余额(全部累计) + 上月结存(这里用全部 RMB/USDT 加总当「本月异动后结存」)
    const rmbSum  = all.reduce((n,r) => n + (Number(r.vrmb)||0), 0);

      <button class="btn btn-sm" ${undoN?'':'disabled'} onclick="gridUndo('${t.id}')">↶ 上一步</button>
      <button class="btn btn-sm" onclick="openCloud('${t.id}')">📥 汇入 CSV</button>
      <button class="btn btn-sm btn-danger" onclick="clearPage('${t.id}')">🗑 清空本页</button>
    </div>`;
    const balBox = limitBar + `<div class="vbal3">
      <div class="vb3 vb3-rmb">

    </div>`;

    const tbl = rows.length
      ? `<div class="vtbl-wrap"><table class="vtbl"><thead><tr>${head}<th class="tr-act"></th></tr></thead>
          <tbody>${bodyRows}</tbody></table></div>`
      : emptyMsg();
    return balBox + tbl;

  // 没有日期栏的版型：不分年份
  if(!hasDate) return bar + (rows.length ? table(rows) : emptyMsg());

  const groups = {};
  rows.forEach(r => (groups[yearOf(r)] ||= []).push(r));
  const years = Object.keys(groups).sort((a,b) =>
    a === '未填日期' ? 1 : b === '未填日期' ? -1 : b.localeCompare(a));

// 简单 CSV 解析（支援引号内逗号）
function parseCSV(text){
  const rows = []; let row = [], cur = '', inQ = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(inQ){
      if(c === '"' && text[i+1] === '"'){ cur += '"'; i++; }
      else if(c === '"'){ inQ = false; }
      else cur += c;
    }else{
      if(c === '"') inQ = true;
      else if(c === ','){ row.push(cur); cur = ''; }
      else if(c === '\n'){ row.push(cur); rows.push(row); row = []; cur = ''; }
      else if(c === '\r'){}
      else cur += c;
    }
  }
  if(cur !== '' || row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ''));
}
let cloudRaw = null;   // 原始解析（含标题）
function cloudRead(input){
  const file = input.files && input.files[0];
  const msg = document.getElementById('cloudMsg');

  document.getElementById('cloudFileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      cloudRaw = parseCSV(e.target.result);
      cloudRepreview();
      msg.textContent = '读取成功，确认无误就按「汇入」'; msg.className = 'cloud-msg ok';
    }catch(err){
      msg.textContent = '读取失败：' + err.message; msg.className = 'cloud-msg err';
    }
  };
  reader.onerror = () => { msg.textContent = '档案读取失败'; msg.className = 'cloud-msg err'; };
  reader.readAsText(file, 'utf-8');
}

const RT_OK = {B:1,STRONG:1,I:1,EM:1,U:1,BR:1,SPAN:1,DIV:1,P:1,FONT:1};
function sanitizeHtml(html){
  const box = document.createElement('div');
  box.innerHTML = html;
  (function walk(node){
    [...node.childNodes].forEach(n => {
      if(n.nodeType === 3) return;
      if(n.nodeType !== 1){ n.remove(); return }
      if(!RT_OK[n.tagName]){ n.replaceWith(...n.childNodes); return }
      const color = n.getAttribute('color') || n.style?.color || '';
      const bg    = n.style?.backgroundColor || '';
      [...n.attributes].forEach(a => n.removeAttribute(a.name));
      if(n.tagName === 'FONT'){
        const sp = document.createElement('span');
        if(color) sp.style.color = color;
        sp.append(...n.childNodes); n.replaceWith(sp); return walk(sp);
      }
      if(color) n.style.color = color;
      if(bg) n.style.backgroundColor = bg;
      walk(n);
    });
  })(box);
  return box.innerHTML;
}
function rtSync(key){

/* 切换器：拖著换顺序；没拖就是切换 */
let sdrag = null;
const clearSegMarks = () => document.querySelectorAll('.seg').forEach(x => x.classList.remove('over-l','over-r'));
function segDown(ev, tid, key){
  ev.preventDefault();
  const el = ev.currentTarget, v = el.dataset.v, x0 = ev.clientX;
  let moved = false;
  sdrag = null;
  const move = e => {
    if(!moved && Math.abs(e.clientX - x0) > 5){
      moved = true;
      el.classList.add('dragging'); document.body.classList.add('dragging-on');
    }
    if(!moved) return;
    clearSegMarks(); sdrag = null;
    const over = document.elementFromPoint(e.clientX, e.clientY);
    const seg = over && over.closest ? over.closest('.seg') : null;
    if(seg && seg.dataset.v && seg.dataset.v !== v){
      const b = seg.getBoundingClientRect();
      const after = (e.clientX - b.left) > b.width / 2;
      seg.classList.add(after ? 'over-r' : 'over-l');
      sdrag = {target:seg.dataset.v, after};
    }
  };
  const up = () => {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    el.classList.remove('dragging'); document.body.classList.remove('dragging-on'); clearSegMarks();
    if(moved){ if(sdrag) reorderSeg(tid, key, v, sdrag.target, sdrag.after) }
    else setSeg(tid, v);
    sdrag = null;
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
  document.addEventListener('pointercancel', up);
}
function reorderSeg(tid, key, v, targetV, after){
  const t = findTab(tid);
  const f = colsOf(t).find(x => x.key === key);
  const list = clone(optsOf(t, f));
  const from = list.findIndex(o => o.v === v);
  const [m] = list.splice(from, 1);
  const to = list.findIndex(o => o.v === targetV);
  list.splice(after ? to + 1 : to, 0, m);
  (t.opts ||= {})[key] = list;
  save(); renderBoard(); toast('顺序已更新');
}
/* 分页：拖著换位子；没拖就是点击切换 */
let tdrag = null;
const clearTabMarks = () => document.querySelectorAll('.tab').forEach(x => x.classList.remove('over-l','over-r'));
function tabDown(e, tid){
  e.preventDefault();
  const el = e.currentTarget, x0 = e.clientX;
  let moved = false;
  tdrag = null;
  const move = ev => {
    if(!moved && Math.abs(ev.clientX - x0) > 5){
      moved = true;
      el.classList.add('dragging');
      document.body.classList.add('dragging-on');
    }
    if(!moved) return;
    clearTabMarks(); tdrag = null;
    const over = document.elementFromPoint(ev.clientX, ev.clientY);
    const tab = over && over.closest ? over.closest('.tab') : null;
    if(tab && tab.dataset.id !== tid){
      const b = tab.getBoundingClientRect();
      const after = (ev.clientX - b.left) > b.width / 2;
      tab.classList.add(after ? 'over-r' : 'over-l');
      tdrag = {target:tab.dataset.id, after};
    }
  };
  const up = () => {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    el.classList.remove('dragging'); document.body.classList.remove('dragging-on'); clearTabMarks();
    if(moved){ if(tdrag) reorderTab(tid, tdrag.target, tdrag.after) }
    else goTab(tid);
    tdrag = null;
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
  document.addEventListener('pointercancel', up);
}
function reorderTab(tid, targetId, after){
  const c = cat();
  const from = c.tabs.findIndex(t => t.id === tid);
  const [m] = c.tabs.splice(from, 1);
  const to = c.tabs.findIndex(t => t.id === targetId);
  c.tabs.splice(after ? to + 1 : to, 0, m);
  save(); renderTabs(); toast('分页顺序已更新');
}
function renderTabs(){
  const c = cat();
  const shown = c.tabs.filter(t => !t.sub || t.id === curTab);
  document.getElementById('tabRail').innerHTML =
    (shown.length > 1 ? shown.map(t => `
      <button class="tab ${t.id===curTab?'on':''}${t.sub?' tab-sub':''}" data-id="${t.id}"
              onpointerdown="tabDown(event,'${t.id}')">${t.sub?'↳ ':''}${esc(t.name)}</button>`).join('') : '');
}
function renderBoard(){
  const c = cat(), b = document.getElementById('board');
  if(!c.tabs.length){
    b.innerHTML = `<div class="empty"><h3>${esc(c.name)} 还没有分页</h3>
      <p>建一个分页，绑上这一类要看的 Google 试算表。</p>
      <button class="btn btn-solid" onclick="openTabDialog()">＋ 新增分页</button></div>`;
    return;
  }
  const t = tab();
  if(!t){ curTab = c.tabs[0].id; renderTabs(); return renderBoard(); }
  const q = document.getElementById('q').value.trim().toLowerCase();

  if(t.kind === 'grid'){
    b.classList.remove('board-embed');
    document.querySelector('.main')?.classList.remove('main-embed');

    document.querySelectorAll('.rc textarea').forEach(autoGrow);

  if(t.kind === 'embed'){
    const u = t.url || '';
    if(!u){

    }
    const frame = `<iframe id="if_${t.id}" class="embed-frame" src="${esc(u)}"
        onload="embedOk('${t.id}')" referrerpolicy="no-referrer"
        allow="clipboard-read; clipboard-write"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-downloads allow-top-navigation-by-user-activation"></iframe>`;
    b.classList.toggle('board-embed', !!t.bare);
    document.querySelector('.main')?.classList.toggle('main-embed', !!t.bare);
    b.innerHTML = t.bare
      ? `<div class="embed-wrap bare">
          <div class="embed-hint" id="hint_${t.id}">载入中…若一直空白，代表这个网站不允许被内嵌。<a href="${esc(u)}" target="_blank" rel="noopener">改用新分页开启 ↗</a></div>
          ${frame}
        </div>`
      : `<div class="embed-wrap">
          <div class="embed-bar">
            <span class="embed-url" title="${esc(u)}">${esc(u)}</span><span class="sp"></span>
            <button class="btn btn-sm" onclick="reloadEmbed('${t.id}')">↻ 重新整理</button>
            <a class="btn btn-sm" href="${esc(u)}" target="_blank" rel="noopener">↗ 开新分页</a>
          </div>
          <div class="embed-hint" id="hint_${t.id}">载入中…若一直空白，代表这个网站不允许被内嵌，请按「↗ 开新分页」。</div>
          ${frame}
        </div>`;
    renderTools();
    return;
  }

  const d = cache[t.id] || {status:'idle'};
  let table = '';
  if(d.status === 'nosrc') table = `<p style="padding:18px 0;font-size:13px;color:var(--ink2)">
      这一类还没绑试算表。设定一次，底下每个分页就会各自去抓同名的工作表。<br>
      <button class="btn btn-sm btn-solid" style="margin-top:9px" onclick="openCatDialog('${c.id}')">设定本类试算表</button></p>`;
  else if(d.status === 'load') table = `<p style="color:var(--ink2);padding:22px 0">载入中…</p>`;
  else if(d.status === 'err') table = `<p style="color:var(--red);padding:18px 0;font-size:13px">${esc(d.err)}<br>
    <span style="color:var(--ink3)">试算表需设为「知道连结的人可检视」。</span></p>`;
  else if(d.status === 'ok'){
    const rows = q ? d.rows.filter(r => r.some(v => String(v).toLowerCase().includes(q))) : d.rows;
    table = !rows.length
      ? `<p style="color:var(--ink3);padding:18px 0;font-size:13px">${q ? '这个关键字没有符合的列。' : '这份工作表是空的。'}</p>`
      : `<div class="tbl-wrap"><table>
          <thead><tr><th class="rownum">#</th>${d.cols.map(x => `<th>${esc(x)}</th>`).join('')}</tr></thead>
          <tbody>${rows.map((r,i) => `<tr><td class="rownum">${i+1}</td>${
            d.cols.map((_,j) => `<td>${link(r[j] ?? '')}</td>`).join('')}</tr>`).join('')}
          </tbody></table></div>`;
  } else table = `<p style="color:var(--ink3);padding:18px 0;font-size:13px">尚未载入，按上方「重新载入」抓取。</p>`;

  const badge = d.status === 'ok' ? `<span class="status st-ok">${d.rows.length} 列</span>`
    : d.status === 'load' ? `<span class="status st-load">载入中</span>`
    : d.status === 'err' ? `<span class="status st-err">失败</span>` : '';

  b.innerHTML = `
    <section class="card ${t.co1?'collapsed':''}">
      <div class="card-head" onclick="fold('co1')">
        <span class="caret">▼</span><span class="card-title">${esc(t.name)}</span>
        <span class="card-meta">${badge}${d.at?`<span>${d.at.toLocaleTimeString('zh-TW',{hour12:false})} 更新</span>`:''}<span>${esc(srcLabel(t))}</span>${tabSid(t)?`<span>表 …${esc(tabSid(t).slice(-6))}</span>`:''}</span>
      </div>
      <div class="card-body">${table}</div>
    </section>
    `;
  renderTools();
}
function renderTools(){
  const el = document.getElementById('tools');
  const t = tab();
